version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434 # name matches the ollama service
    ports:
      - "12434:11434"
    restart: unless-stopped

  visva-citadel:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - VISVA_API_KEY=${VISVA_API_KEY}

      - VISVA_WORKSPACE=/workspace
    volumes:
      - visva_workspace:/workspace
      - ./visva_neural_memory:/visva_engine/visva_neural_memory
      # Mount the enterprise license file (generated by generate_license.py)
      - ./Deploy_${CLIENT_NAME}/visva_enterprise.key:/visva_engine/visva_enterprise.key:ro
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  visva_workspace:
