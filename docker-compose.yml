services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "12434:11434"
    restart: unless-stopped

  visva-citadel:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - VISVA_API_KEY=${VISVA_API_KEY}
      - VISVA_STORAGE_ROOT=${VISVA_STORAGE_ROOT:-/workspace}
      - VISVA_KEY_FILE=/visva_engine/visva_enterprise.key
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
      - SSL_KEYFILE=${SSL_KEYFILE}
      - SSL_CERTFILE=${SSL_CERTFILE}
    volumes:
      - ./workspace:/workspace
      - ./visva_neural_memory:/visva_engine/visva_neural_core
      - ./visva_enterprise.key:/visva_engine/visva_enterprise.key:ro

    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
